name: verify-mytoken

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Print MYTOKEN first 6 chars
        run: |
          if [ -z "$MYTOKEN" ]; then
            echo "MYTOKEN IS EMPTY"
            exit 1
          fi
          echo "MYTOKEN starts with: ${MYTOKEN:0:6}... (length ${#MYTOKEN})"
        env:
          MYTOKEN: ${{ secrets.MYTOKEN }}
