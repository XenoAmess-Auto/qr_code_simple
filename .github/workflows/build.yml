name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK, run unit tests and generate coverage report
        timeout-minutes: 60
        run: ./gradlew --no-daemon :app:assembleDebug :app:testDebugUnitTest :app:jacocoTestReport -PexcludeExtendedUiTests

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/
          if-no-files-found: warn

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: app/build/reports/jacoco/
          retention-days: 7
          if-no-files-found: warn

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: app/build/reports/tests/

  coverage-pages:
    name: Deploy Coverage Report to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - name: Download coverage report
        uses: actions/download-artifact@v8
        with:
          name: coverage-report
          path: coverage-report

      - name: Generate coverage badge JSON
        run: |
          mkdir -p pages
          python3 - <<'PY'
          import json
          import xml.etree.ElementTree as ET
          from pathlib import Path

          xml_path = Path('coverage-report/html/jacocoTestReport.xml')
          if not xml_path.exists():
              xml_path = Path('coverage-report/jacocoTestReport.xml')
          if not xml_path.exists():
              raise FileNotFoundError('JaCoCo XML report not found')

          root = ET.parse(xml_path).getroot()
          pct = 0
          for counter in root.findall('counter'):
              if counter.get('type') == 'INSTRUCTION':
                  covered = int(counter.get('covered'))
                  missed = int(counter.get('missed'))
                  total = covered + missed
                  pct = round(covered / total * 100) if total > 0 else 0
                  break

          color = 'green' if pct >= 80 else 'yellow' if pct >= 60 else 'red'
          with open('pages/coverage.json', 'w') as f:
              json.dump({
                  'schemaVersion': 1,
                  'label': 'coverage',
                  'message': f'{pct}%',
                  'color': color
              }, f)
          PY

      - name: Prepare Pages content
        run: |
          cp -R coverage-report/html/* pages/
          mv pages/index.html pages/coverage.html
          # Remove any leftover index.html to keep the root slot free
          rm -f pages/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: pages/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
