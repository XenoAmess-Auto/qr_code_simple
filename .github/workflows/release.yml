name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 若配置了 RELEASE_KEYSTORE_BASE64 secret 则使用正式签名；
      # 否则 release 构建回退到 debug 签名（见 app/build.gradle）。
      - name: Decode release keystore (if configured)
        run: |
          if [ -n "${KEYSTORE_BASE64}" ]; then
            echo "${KEYSTORE_BASE64}" | base64 -d > "${RUNNER_TEMP}/release.keystore"
            echo "RELEASE_KEYSTORE_FILE=${RUNNER_TEMP}/release.keystore" >> "${GITHUB_ENV}"
          else
            echo "No RELEASE_KEYSTORE_BASE64 secret; falling back to debug signing"
          fi
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}

      - name: Build release APK and AAB
        timeout-minutes: 60
        run: ./gradlew --no-daemon :app:assembleRelease :app:bundleRelease
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEYSTORE_ALIAS: ${{ secrets.RELEASE_KEYSTORE_ALIAS }}

      - name: Get version from tag
        id: version
        run: echo "tag_version=${GITHUB_REF_NAME#v}" >> "${GITHUB_OUTPUT}"

      - name: Report artifact sizes
        run: |
          ls -lh app/build/outputs/apk/release/*.apk || true
          ls -lh app/build/outputs/bundle/release/*.aab || true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "v${{ steps.version.outputs.tag_version }}" \
            --generate-notes \
            app/build/outputs/apk/release/app-release.apk \
            app/build/outputs/bundle/release/app-release.aab
